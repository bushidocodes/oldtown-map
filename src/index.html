<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Old Town Alexandria Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!--Link to the concatenated stylesheet created by gulp-->
    <!--This concatendated stylesheet includes a Start Bootstrap theme available at http://startbootstrap.com/template-overviews/simple-sidebar/-->
    <link rel="stylesheet" href="css/styles.css">

    <!-- iOS Web App Content -->
    <!--View http://blog.teamtreehouse.com/optimizing-mobile-web-apps-ios to understand these tags-->
    <!--Content based on tfausak's iOS8 web app shell located at https://gist.github.com/tfausak/2222823 -->

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Make the app title different than the page title. -->
    <meta name="apple-mobile-web-app-title" content="Old Town Map">

    <!-- Configure the status bar. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <!--iOS icons-->
    <!--Optimized for iOS9 based on sizes at https://makeappicon.com/ios9icon-->
    <link rel="icon" href="images/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="152x152" href="images/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="images/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="167x167" href="images/apple-touch-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon-180x180.png">

</head>

<body>

    <div id="wrapper">

        <div class="overlay"></div>

        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <ul class="sidebar-nav">
                <li class="h3">Historic Sites</li>
                <!--Append search element to the sidebar-->
                <li><input type="text" class="form-control" data-bind="textInput: searchString" placeholder="Search"
                    /></li>
                <li><button class="btn btn-xs favorites-btn" data-bind="click: toggleShowFavorites, css: {'btn-warning': showFavoritesOnly, 'btn-default': !showFavoritesOnly()}">&#9733; Favorites</button></li>
                <!--Append data model to the sidebar-->
                <span data-bind="foreach: filteredSites">
                    <li class="site" data-bind="click: $root.selectSite, event: { mouseover: $root.highlightMarkerOfSite, mouseout: $root.unhighlightMarkerOfSite }">
                        <span class="favorite-star" data-bind="click: $root.toggleFavorite, clickBubble: false, css: {'is-favorite': isFavorite}" title="Toggle favorite">&#9733;</span>
                        <a data-bind="text: name"></a>
                    </li>
                </span>
            </ul>
        </div>

        <!-- Navbar -->
        <nav class="navbar navbar-inverse">
            <button type="button" class="hamburger is-closed navbar-btn navbar-left" id="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span class="hamb-top"></span>
                <span class="hamb-middle"></span>
                <span class="hamb-bottom"></span>
            </button>
            <span class="navbar-text h4">Old Town Map</span>
        </nav>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <div class="container-fluid">
                <div data-bind="visible: wasWarnedAboutWikipedia" class="alert alert-warning alert-dismissible" id="wikipedia-alert" role="alert">
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <strong>Warning!</strong> Wikipedia Resources are not responding
                </div>
                <div data-bind="visible: wasWarnedAboutMaps" class="alert alert-warning alert-dismissible" id="google-maps-alert" role="alert">
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <strong>Warning!</strong> Google Maps not responding
                </div>
                <div class="row">
                    <div class="col-lg-12" id="map"></div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/knockout@3.5.3/build/output/knockout-latest.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/knockstrap@1.3.2/build/knockstrap.min.js"></script>
    <script src="js/scripts.js"></script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=%%MAPS_API_KEY%%&callback=initMap&loading=async" onerror="googleMapsError()"></script>


</body>

</html>
